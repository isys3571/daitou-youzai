<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 大東熔材株式会社</title>
  <meta name="description" content="大東熔材株式会社は、大阪府東大阪市に拠点を置く溶接機材・工業用高圧ガス・工作機械の専門商社です。昭和36年（1961年）創業。">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/css/tailwind.css">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="{ mobileMenuOpen: false }" class="bg-white overflow-x-hidden">

  <nav
  id="mobile-nav"
  class="fixed top-0 left-0 h-full w-[280px] z-50 -translate-x-full transition-transform duration-300 md:hidden"
  style="background:#1a2633;"
  :class="{ '-translate-x-full': !mobileMenuOpen, 'translate-x-0': mobileMenuOpen }"
>
  <div class="flex flex-col h-full">

    <!-- ヘッダー -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-white/10">
      <span class="font-display text-cream text-xl font-bold">大東熔材株式会社</span>
      <button @click="mobileMenuOpen = false" class="text-cream/50 hover:text-cream transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- メニュー -->
    <div class="flex-1 overflow-y-auto">
      
      
        <a href="/"
           class="flex items-center justify-between px-6 py-4 font-sans text-sm border-b border-white/10 transition-colors
                  text-cream hover:bg-white/5"
           style="">
          トップページ
          <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      
        <a href="/shohin/"
           class="flex items-center justify-between px-6 py-4 font-sans text-sm border-b border-white/10 transition-colors
                  text-cream hover:bg-white/5"
           style="">
          取扱商品
          <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      
        <a href="/kaisha-joho/"
           class="flex items-center justify-between px-6 py-4 font-sans text-sm border-b border-white/10 transition-colors
                  text-cream hover:bg-white/5"
           style="">
          会社情報
          <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      
        <a href="/access/"
           class="flex items-center justify-between px-6 py-4 font-sans text-sm border-b border-white/10 transition-colors
                  text-cream hover:bg-white/5"
           style="">
          アクセス
          <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      
        <a href="/contact/"
           class="flex items-center justify-between px-6 py-4 font-sans text-sm border-b border-white/10 transition-colors
                  text-accent bg-white/5"
           style="border-left:3px solid #1565c0;">
          お問い合わせ
          <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      
    </div>

    <!-- フッター -->
    <div class="px-6 py-5 border-t border-white/10">
      <p class="text-cream/30 text-xs font-sans">〒577-0016 大阪府東大阪市長田西4丁目4番3号</p>
      <a href="tel:06-6746-0881" class="text-cream/50 text-sm font-en mt-1 block hover:text-cream transition-colors">06-6746-0881</a>
    </div>

  </div>
</nav>


  <!-- モバイルメニュー用オーバーレイ -->
  <div
    x-show="mobileMenuOpen"
    @click="mobileMenuOpen = false"
    class="fixed inset-0 bg-black/50 z-30 md:hidden"
    x-transition:enter="transition-opacity duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-300"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    style="display:none"
  ></div>

  <div
    id="container"
    class="transition-transform duration-300"
    :class="{ 'translate-x-[280px]': mobileMenuOpen }"
  >
    <header class="sticky top-0 z-40 bg-white border-b border-gray-100">
  <div class="container">
    <div class="flex items-center justify-between h-16 md:h-20">

      <!-- ロゴ -->
      <a href="/" class="flex items-baseline gap-1.5 group">
        <span class="font-display text-primary text-2xl md:text-3xl font-bold leading-none">大東熔材</span>
        <span class="font-sans text-primary/60 text-sm md:text-lg tracking-wider">株式会社</span>
      </a>

      <!-- デスクトップナビ -->
      <nav class="hidden md:flex items-center">
        <a href="/kaisha-joho/"
           class="font-sans text-sm tracking-wide px-6 py-2 transition-colors duration-200 text-body hover:text-primary">
          会社情報
        </a>
        <span class="w-px h-4" style="background:#ddd;"></span>
        <a href="/shohin/"
           class="font-sans text-sm tracking-wide px-6 py-2 transition-colors duration-200 text-body hover:text-primary">
          取扱商品
        </a>
        <span class="w-px h-4" style="background:#ddd;"></span>
        <a href="/access/"
           class="font-sans text-sm tracking-wide px-6 py-2 transition-colors duration-200 text-body hover:text-primary">
          アクセス
        </a>
        <a href="/contact/"
           class="font-sans text-xs bg-primary text-white px-5 py-2 hover:bg-accent transition-colors duration-200 ml-3">
          お問い合わせ
        </a>
      </nav>

      <!-- ハンバーガー（モバイル） -->
      <button
        @click.prevent="mobileMenuOpen = !mobileMenuOpen"
        class="md:hidden p-2 text-primary"
        aria-label="メニューを開く"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" style="display:none"/>
        </svg>
      </button>

    </div>
  </div>
</header>


    <main>
      <div class="container py-24 text-center">
  <h1 class="font-display text-primary text-4xl mb-4">お問い合わせ</h1>
  <p class="font-sans text-body/50">（準備中）</p>
</div>

    </main>

    <footer style="background:#1a2633;">
  <div class="container">

    <div class="py-10 md:py-12 flex flex-col md:flex-row md:items-start md:justify-between gap-8 md:gap-12"
         style="border-bottom:1px solid rgba(255,255,255,.1);">

      <!-- 会社情報 -->
      <div>
        <div class="font-display text-white text-lg mb-3">大東熔材株式会社</div>
        <address class="font-sans text-sm leading-7 not-italic" style="color:rgba(255,255,255,.5);">
          〒577-0016 大阪府東大阪市長田西4丁目4番3号<br>
          TEL：<a href="tel:06-6746-0881"
                 class="hover:text-accent transition-colors" style="color:rgba(255,255,255,.5);">06-6746-0881</a>
        </address>
      </div>

      <!-- ナビ -->
      <nav class="flex flex-col gap-2.5">
        <a href="/"             class="font-sans text-sm transition-colors hover:text-accent" style="color:rgba(255,255,255,.5);">トップページ</a>
        <a href="/shohin/"      class="font-sans text-sm transition-colors hover:text-accent" style="color:rgba(255,255,255,.5);">取扱商品</a>
        <a href="/kaisha-joho/" class="font-sans text-sm transition-colors hover:text-accent" style="color:rgba(255,255,255,.5);">会社情報</a>
        <a href="/access/"      class="font-sans text-sm transition-colors hover:text-accent" style="color:rgba(255,255,255,.5);">アクセス</a>
        <a href="/contact/"     class="font-sans text-sm transition-colors hover:text-accent" style="color:rgba(255,255,255,.5);">お問い合わせ</a>
      </nav>

    </div>

    <div class="py-5">
      <p class="font-sans text-xs" style="color:rgba(255,255,255,.3);">&copy; 大東熔材株式会社. All rights reserved.</p>
    </div>

  </div>
</footer>

  </div>

  <!-- トップに戻るボタン -->
  <button
    x-data="{ show: false }"
    x-init="window.addEventListener('scroll', () => { show = window.scrollY > 400 })"
    x-show="show"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
    class="fixed bottom-6 right-6 z-50 w-11 h-11 flex items-center justify-center bg-primary text-cream border border-white/20 shadow-md hover:bg-accent transition-colors"
    aria-label="ページの先頭に戻る"
    style="display:none"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
    </svg>
  </button>

</body>
</html>
